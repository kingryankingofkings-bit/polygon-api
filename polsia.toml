# polsia.toml — Polsia deploy manifest for this Next.js + Prisma app.
#
# Read SERVER-SIDE by Polsia's deploy pipeline at the deployed commit to drive
# how this app is built, started, health-checked and given its listen port.
# Parsing is fail-open per field: a missing/invalid field falls back to the
# platform default for that field, so a mistake here never blocks a deploy.
#
# AGENT: you OWN this file ONLY to declare scheduled work — append [[crons]]
# blocks (see the commented example). Do NOT change build / start /
# healthcheck_path / port_env_var: they mirror the verified platform manifest
# for this template and a wrong value silently degrades the deploy.

runtime = "node"

# next build typechecks with the devDependency toolchain (typescript, @types)
# that a production install would omit — hence --include=dev. postinstall runs
# `prisma generate`, so the client is ready before the build.
build = "npm install --include=dev && npm run build"

# Schema-only template (prisma/schema/, no migrations dir): materialize the
# schema at start with an idempotent `prisma db push` (fast no-op once it
# matches), then boot Next. --skip-generate: client already generated by the
# build's postinstall. --accept-data-loss: non-interactive.
start = "npx prisma db push --skip-generate --accept-data-loss && npm start"

# The deploy pipeline's readiness probe hits this route (src/app/health/route.ts).
healthcheck_path = "/health"

# Next reads its listen port from PORT; the hosting provider sets it.
port_env_var = "PORT"

# DATABASE_URL is resolved from the provisioned Postgres (rdbms capability) and
# injected into the build AND runtime env. It must be PRESENT at build time:
# next.config.ts loads src/lib/env.ts, which Zod-validates env presence.
[env]
DATABASE_URL = { source = "rdbms" }

# Scheduled work — APPEND a block per recurring job (no in-process schedulers).
# Each command runs in a fresh checkout. `dependencies` installs extra npm
# packages for that job only. Example:
#
# [[crons]]
# name = "daily-digest"          # kebab, /^[a-z][a-z0-9-]{0,62}$/, unique
# schedule = "0 9 * * *"          # 5-field POSIX cron
# command = "node jobs/daily-digest.js"
# dependencies = ["pdfkit"]       # optional
